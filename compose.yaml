services:
  migrations:
    image: registry.kiora.tech/kiora/crm-gdb_php:0.18.5
    networks:
      - crm-gdb-dev_default
    command: sh -c "php bin/console doctrine:migrations:migrate --no-interaction"
    environment:
      - APP_ENV=prod
      - DATABASE_URL=${DATABASE_URL:-postgresql://symfony:symfony@database:5432/symfony_docker?serverVersion=16&charset=utf8}
    deploy:
      placement:
        constraints:
          - node.hostname == raspberrypi5peo16
      restart_policy:
        condition: none
  php:
    image: registry.kiora.tech/kiora/crm-gdb_php:0.18.5
    networks:
      - crm-gdb-dev_default
    environment:
      - APP_ENV=prod
      - DATABASE_URL=${DATABASE_URL:-postgresql://symfony:symfony@database:5432/symfony_docker?serverVersion=16&charset=utf8}
      - MAILER_DSN=${MAILER_DSN:-smtp://mailer:1025}
      - SYMFONY_TRUSTED_PROXIES=${SYMFONY_TRUSTED_PROXIES:-127.0.0.1}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minio123}
      - S3_BUCKET=${S3_BUCKET:-gdbcrmdocuments}
      - S3_REGION=${S3_REGION:-us-east-1}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-%kernel.project_dir%/config/jwt/private.pem}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-%kernel.project_dir%/config/jwt/public.pem}
      - JWT_PASSPHRASE=${JWT_PASSPHRASE:-}
      - OAUTH_ENCRYPTION_KEY=${OAUTH_ENCRYPTION_KEY:-}
    volumes:
      - /srv/swarm-data/${ENV:-prod}/crm-gdb/uploads:/var/www/website/public/uploads
      - /srv/swarm-data/${ENV:-prod}/crm-gdb/import:/var/www/website/var/import
      - /srv/swarm-data/${ENV:-prod}/crm-gdb/logs:/var/www/website/var/log
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == raspberrypi5peo16
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
  nginx:
    image: registry.kiora.tech/kiora/crm-gdb_nginx:0.18.5
    networks:
      - crm-gdb-dev_default
    depends_on:
      - php
    ports:
      - "${NGINX_PORT:-81}:80"
    volumes:
      - /srv/swarm-data/${ENV:-prod}/crm-gdb/logs:/var/log/nginx
    deploy:
      placement:
        constraints:
          - node.hostname == raspberrypi5peo16
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
  supervisor:
    image: registry.kiora.tech/kiora/crm-gdb_php:0.18.5-supervisor
    networks:
      - crm-gdb-dev_default
    volumes:
      - /srv/swarm-data/${ENV:-prod}/crm-gdb/uploads:/var/www/website/public/uploads
      - /srv/swarm-data/${ENV:-prod}/crm-gdb/import:/var/www/website/var/import
      - /srv/swarm-data/${ENV:-prod}/crm-gdb/logs:/var/www/website/var/log
    environment:
      - APP_ENV=prod
      - DATABASE_URL=${DATABASE_URL:-postgresql://symfony:symfony@database:5432/symfony_docker?serverVersion=16&charset=utf8}
      - MAILER_DSN=${MAILER_DSN:-smtp://mailer:1025}
      - SYMFONY_TRUSTED_PROXIES=${SYMFONY_TRUSTED_PROXIES:-127.0.0.1}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minio123}
      - S3_BUCKET=${S3_BUCKET:-gdbcrmdocuments}
      - S3_REGION=${S3_REGION:-us-east-1}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-%kernel.project_dir%/config/jwt/private.pem}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-%kernel.project_dir%/config/jwt/public.pem}
      - JWT_PASSPHRASE=${JWT_PASSPHRASE:-}
      - OAUTH_ENCRYPTION_KEY=${OAUTH_ENCRYPTION_KEY:-}
    deploy:
      placement:
        constraints:
          - node.hostname == raspberrypi5peo16
      restart_policy:
        condition: any
        delay: 15s
        window: 300s
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  crm-gdb-dev_default:
    external: false
volumes:
  redis_data: { }
