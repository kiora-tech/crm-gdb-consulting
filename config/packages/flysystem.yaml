flysystem:
    storages:
        documents.storage:
            adapter: 'aws'
            options:
                client: 's3.client'
                bucket: '%env(S3_BUCKET)%'
                prefix: 'documents'

        templates.storage:
            adapter: 'aws'
            options:
                client: 's3.client'
                bucket: '%env(S3_BUCKET)%'
                prefix: 'templates'

services:
    s3.client:
        class: Aws\S3\S3Client
        arguments:
            - endpoint: '%env(S3_ENDPOINT)%'
              credentials:
                key: '%env(S3_ACCESS_KEY)%'
                secret: '%env(S3_SECRET_KEY)%'
              region: '%env(S3_REGION)%'
              version: 'latest'
              use_path_style_endpoint: true