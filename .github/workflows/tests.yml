name: Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  tests:
    name: PHPUnit Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.4']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: symfony_test
          POSTGRES_USER: symfony
          POSTGRES_PASSWORD: symfony
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U symfony -d symfony_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_pgsql, dom, filter, gd, json, zip
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U symfony; do
            echo 'Waiting for PostgreSQL...'
            sleep 2
          done
          echo 'PostgreSQL is ready!'

      - name: Create test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
        env:
          DATABASE_URL: postgresql://symfony:symfony@127.0.0.1:5432/symfony_test?serverVersion=16&charset=utf8
          APP_ENV: test

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
        env:
          DATABASE_URL: postgresql://symfony:symfony@127.0.0.1:5432/symfony_test?serverVersion=16&charset=utf8
          APP_ENV: test

      - name: Build SASS assets
        run: php bin/console sass:build
        env:
          APP_ENV: test

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse
        env:
          APP_ENV: test

      - name: Run PHPUnit
        run: vendor/bin/phpunit
        env:
          DATABASE_URL: postgresql://symfony:symfony@127.0.0.1:5432/symfony_test?serverVersion=16&charset=utf8
          APP_ENV: test
          MICROSOFT_CLIENT_ID: dummy-client-id-for-tests
          MICROSOFT_CLIENT_SECRET: dummy-client-secret-for-tests
          MICROSOFT_TENANT_ID: dummy-tenant-id-for-tests

      - name: Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
        env:
          APP_ENV: test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: phpunit-results
          path: var/log/
